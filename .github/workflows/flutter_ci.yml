name: Flutter CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v3

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
         flutter-version: '3.x'

      - name: Paketleri yükle
        run: flutter pub get

      - name: Analiz
        run: flutter analyze

      - name: Testleri çalıştır
        run: flutter test

      - name: APK build al
        run: flutter build apk --release

      - name: Firebase CLI kur
        run: npm install -g firebase-tools

      - name: Firebase App Distribution'a gönder
        run: |
         firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
         --1:399204907929:android:f63a7c51492deba1da3108 \
         --groups "testers"
    env:
      FIREBASE_TOKEN: ${{ secrets.DEVICE_LOG_FIREBASE }}

